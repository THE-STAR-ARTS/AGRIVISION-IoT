<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated System Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50; /* Dark blue background */
            color: #ecf0f1; /* Light grey text */
            margin: 0;
            padding: 0;
            transition: background-color 0.5s, color 0.5s;
        }
        .header {
            background-color: #1abc9c; /* Teal header */
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        .container {
               display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 20px;
        }
        .card {
            background-color: #34495e; /* Dark grey card background */
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            margin: 20px;
            padding: 20px;
            width: 300px;
            transition: transform 0.3s;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card h3 {
            margin-top: 0;
        }
        .button {
            background-color: #27ae60; /* Green button */
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #229954; /* Darker green on hover */
        }
        .button:active {
            transform: scale(0.95);
        }
        textarea {
            background-color: #2c3e50; /* Dark blue background for textarea */
            color: #ecf0f1; /* Light grey text for textarea */
            border: 1px solid #34495e; /* Dark grey border for textarea */
        }
        .toggle-button {
            background-color: #e74c3c; /* Red button */
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .toggle-button:hover {
            background-color: #c0392b; /* Darker red on hover */
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .spinner::before, .spinner::after {
            content: '';
            position: absolute;
            border: 16px solid transparent;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }
        .spinner::before {
            border-top: 16px solid #3498db; /* Blue */
            width: 100%;
            height: 100%;
        }
        .spinner::after {
            border-bottom: 16px solid #e74c3c; /* Red */
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            animation-duration: 2s;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
    </div>
    <div class="header">
        <h1>Automated System Dashboard</h1>
        <button class="toggle-button" onclick="toggleMode()">Toggle Dark/Light Mode</button>
    </div>
    <div class="container">
        <div class="card">
            <h3>System Status</h3>
            <p id="status">Loading...</p>
            <button class="button" onclick="updateStatus()">Update Status</button>
        </div>
        <div class="card">
            <h3>Control Panel</h3>
            <button class="button" onclick="startSystem()">Start System</button>
            <button class="button" onclick="stopSystem()">Stop System</button>
        </div>
        <div class="card">
            <h3>Logs</h3>
            <textarea id="logs" rows="10" cols="30" readonly></textarea>
            <button class="button" onclick="clearLogs()">Clear Logs</button>
        </div>
        <div class="card">
            <h3>Pump Status</h3>
            <p id="pump-status">Pump is off</p>
            <button class="button" onclick="togglePump()">Toggle Pump</button>
        </div>
        <div class="card">
            <h3>Soil Moisture Content</h3>
            <p id="soil-moisture">Loading...</p>
        </div>
        <div class="card">
            <h3>Light Intensity</h3>
            <p id="light-intensity">Loading...</p>
        </div>
        <div class="card">
            <h3>CO2 Levels</h3>
            <p id="co2-levels">Loading...</p>
        </div>
    </div>
    <script>
        function updateStatus() {
            document.getElementById('status').innerText = 'System is running';
            logAction('Status updated');
        }

        function startSystem() {
            document.getElementById('status').innerText = 'System started';
            logAction('System started');
        }

        function stopSystem() {
            document.getElementById('status').innerText = 'System stopped';
            logAction('System stopped');
        }

        function logAction(action) {
            const logs = document.getElementById('logs');
            logs.value += action + '\\n';
        }

        function clearLogs() {
            document.getElementById('logs').value = '';
        }

        function toggleMode() {
            const body = document.body;
            if (body.style.backgroundColor === 'white') {
                body.style.backgroundColor = '#2c3e50';
                body.style.color = '#ecf0f1';
            } else {
                body.style.backgroundColor = 'white';
                body.style.color = 'black';
            }
        }

        function togglePump() {
            const pumpStatus = document.getElementById('pump-status');
            if (pumpStatus.innerText === 'Pump is off') {
                pumpStatus.innerText = 'Pump is on';
                logAction('Pump turned on');
            } else {
                pumpStatus.innerText = 'Pump is off';
                logAction('Pump turned off');
            }
        }

        // Scroll animation
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.card');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            cards.forEach(card => {
                observer.observe(card);
            });

            // Hide loading screen after 2.5 seconds
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, 3500);
        });
    </script>
</body>
</html>
